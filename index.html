<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reeestyle — Looom Brush Editor</title>
    <style>
        :root {
            --bg: #0f0f13;
            --panel: #1a1a22;
            --text: #e0e0e0;
            --accent: #ff6b6b;
            --accent2: #00d4d4;
            --border: #2a2a35;
            --teal: #00d4d4;
            --pink: #ffd1dc;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            object-fit: contain;
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        
        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn.secondary { background: var(--panel); border: 1px solid var(--border); }
        .btn.teal { background: var(--accent2); color: var(--bg); }
        
        #dropZone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            margin: 2rem auto;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            max-width: 500px;
            width: 90%;
        }
        
        #dropZone.dragover {
            border-color: var(--accent2);
            background: rgba(0, 212, 212, 0.05);
        }
        
        #dropZone.hidden { display: none; }
        
        .drop-logo {
            width: 120px;
            height: auto;
            margin: 0 auto 1.5rem;
            display: block;
        }
        
        .main-layout {
            display: none;
            flex: 1;
            gap: 0;
            height: calc(100vh - 72px);
        }
        
        .main-layout.active { display: flex; }
        
        /* Sidebar */
        #sidebar {
            width: 340px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .thread-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        
        .thread-card:hover { border-color: var(--accent2); }
        
        .thread-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        
        .thread-color-preview {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }
        
        .thread-name {
            font-weight: 600;
            font-size: 0.9375rem;
        }
        
        .control-group {
            margin-bottom: 1rem;
        }
        
        .control-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 0.5rem;
        }
        
        input[type="range"] {
            width: 100%;
            accent-color: var(--accent2);
        }
        
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            cursor: pointer;
        }
        
        select {
            width: 100%;
            padding: 0.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.875rem;
        }
        
        .value-display {
            float: right;
            color: var(--accent2);
            font-weight: 600;
        }
        
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Canvas Area */
        #canvasArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        #svgContainer {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }
        
        #svgContainer svg {
            display: block;
            max-width: 100%;
            max-height: 80vh;
        }
        
        .playback-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.75rem;
            background: rgba(26, 26, 34, 0.9);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .icon-btn:hover { background: var(--accent2); color: var(--bg); }
        
        .hidden { display: none !important; }
        
        .export-menu, .brush-menu {
            position: relative;
        }
        
        .export-options, .brush-options {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 220px;
            display: none;
            z-index: 100;
        }
        
        .export-options.show, .brush-options.show { display: block; }
        
        .export-option, .brush-option {
            padding: 0.625rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }
        
        .export-option:hover, .brush-option:hover { background: var(--bg); }
        
        .brush-option input[type="file"] {
            display: none;
        }
        
        .thread-count {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .brush-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .brush-actions .btn {
            flex: 1;
            font-size: 0.75rem;
            padding: 0.5rem;
        }
        
        .saved-brushes {
            margin-bottom: 1rem;
        }
        
        .saved-brush-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        
        .saved-brush-item button {
            background: none;
            border: none;
            color: var(--accent2);
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .saved-brush-item button:hover {
            color: var(--accent);
        }
        
        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text);
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <img src="logo.png" class="logo-icon" alt="Reeestyle" id="headerLogo">
        <div class="logo-text">
            <h1>Reeestyle</h1>
            <div class="subtitle">Looom Brush Editor</div>
        </div>
    </div>
    <div style="display:flex; gap:0.75rem; align-items:center;">
        <input type="file" id="fileInput" accept=".svg" class="hidden">
        <button class="btn secondary" onclick="document.getElementById('fileInput').click()">Open SVG</button>
        <div class="brush-menu">
            <button class="btn teal" onclick="toggleBrushMenu()">Brushes ▼</button>
            <div class="brush-options" id="brushMenu">
                <div class="brush-option" onclick="saveCurrentBrushes()">💾 Save Brush Preset</div>
                <div class="brush-option" onclick="document.getElementById('brushFileInput').click()">📁 Load Brush Preset</div>
                <div class="brush-option" onclick="resetToDefault()">↩️ Reset to Original</div>
                <input type="file" id="brushFileInput" accept=".json" onchange="loadBrushPreset(event)">
            </div>
        </div>
        <div class="export-menu">
            <button class="btn" onclick="toggleExport()">Export ▼</button>
            <div class="export-options" id="exportMenu">
                <div class="export-option" onclick="exportSVG()">📄 Download SVG</div>
                <div class="export-option" onclick="exportPNG()">🖼️ Download PNG</div>
            </div>
        </div>
    </div>
</header>

<div id="dropZone">
    <img src="logo.png" class="drop-logo" alt="Reeestyle" id="dropLogo">
    <h2 style="margin-bottom: 0.5rem; font-size: 1.25rem;">Drop your Looom .svg file here</h2>
    <p style="color: #888; font-size: 0.9375rem;">or click to browse</p>
    <p style="color: #555; font-size: 0.8rem; margin-top: 1rem;">
        Find your Looom files in the Files app on iPad, or export from Looom
    </p>
</div>

<div class="main-layout" id="mainLayout">
    <aside id="sidebar">
        <h2 style="margin-bottom: 0.5rem; font-size: 1.125rem;">Threads</h2>
        <div class="thread-count" id="threadCount"></div>
        
        <div class="saved-brushes" id="savedBrushesContainer" style="display:none;">
            <div class="section-title">Saved Presets</div>
            <div id="savedBrushesList"></div>
        </div>
        
        <div id="threadsList"></div>
    </aside>
    
    <main id="canvasArea">
        <div id="svgContainer"></div>
        
        <div class="playback-controls">
            <button class="icon-btn" onclick="togglePlay()" id="playBtn">▶</button>
            <button class="icon-btn" onclick="resetView()">⟲</button>
            <button class="icon-btn" onclick="zoom(-0.1)">−</button>
            <button class="icon-btn" onclick="zoom(0.1)">+</button>
        </div>
    </main>
</div>

<script>
// ============================================
// CONFIGURATION - Change your logo filename here
// ============================================
const LOGO_FILENAME = 'logo.png';  // <-- Change this to your logo's filename

// Apply logo filename
document.getElementById('headerLogo').src = LOGO_FILENAME;
document.getElementById('dropLogo').src = LOGO_FILENAME;

// State
let currentSVG = null;
let originalSVG = null;
let threads = [];
let originalThreadStyles = []; // Store original styles for reset
let isPlaying = true;
let animationIntervals = [];
let zoomLevel = 1;
let savedBrushes = JSON.parse(localStorage.getItem('reeestyle_brushes') || '[]');

// DOM Elements
const dropZone = document.getElementById('dropZone');
const mainLayout = document.getElementById('mainLayout');
const threadsList = document.getElementById('threadsList');
const threadCount = document.getElementById('threadCount');
const svgContainer = document.getElementById('svgContainer');
const fileInput = document.getElementById('fileInput');

// File Handling
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.svg')) loadSVG(file);
});
fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) loadSVG(e.target.files[0]);
});

function loadSVG(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(e.target.result, 'image/svg+xml');
        const svg = doc.querySelector('svg');
        
        if (!svg) {
            alert('Invalid SVG file');
            return;
        }
        
        originalSVG = svg.cloneNode(true);
        currentSVG = svg;
        
        // Display
        svgContainer.innerHTML = '';
        svgContainer.appendChild(currentSVG);
        
        // Extract threads (groups in Looom SVGs)
        extractThreads(currentSVG);
        
        // Store original styles for reset
        storeOriginalStyles();
        
        // Show editor
        dropZone.classList.add('hidden');
        mainLayout.classList.add('active');
        
        // Update saved brushes UI
        updateSavedBrushesUI();
        
        // Start animation
        animateSVG();
    };
    reader.readAsText(file);
}

function storeOriginalStyles() {
    originalThreadStyles = threads.map(t => ({
        id: t.id,
        type: t.type,
        color: t.color,
        strokeWidth: t.strokeWidth,
        opacity: t.opacity,
        strokeLinecap: t.strokeLinecap,
        blendMode: t.blendMode
    }));
}

function isThreadVisible(g) {
    let el = g;
    while (el && el.tagName !== 'svg') {
        const display = el.getAttribute('display');
        const visibility = el.getAttribute('visibility');
        const opacity = el.getAttribute('opacity');
        
        if (display === 'none' || visibility === 'hidden') return false;
        if (opacity !== null && parseFloat(opacity) <= 0) return false;
        
        const style = el.getAttribute('style') || '';
        if (style.includes('display:none') || style.includes('visibility:hidden')) return false;
        if (style.includes('opacity:0') || style.includes('opacity: 0')) return false;
        
        el = el.parentElement;
    }
    return true;
}

function hasVisiblePaths(g) {
    const paths = g.querySelectorAll('path, line, polyline, polygon, rect, circle, ellipse');
    if (paths.length === 0) return false;
    
    for (const path of paths) {
        const d = path.getAttribute('d');
        const stroke = path.getAttribute('stroke');
        const fill = path.getAttribute('fill');
        const display = path.getAttribute('display');
        const visibility = path.getAttribute('visibility');
        
        if (display === 'none' || visibility === 'hidden') continue;
        if (path.tagName === 'path' && (!d || d.trim() === '' || d.trim() === 'M0,0')) continue;
        
        const hasVisibleStroke = stroke && stroke !== 'none' && stroke !== 'transparent';
        const hasVisibleFill = fill && fill !== 'none' && fill !== 'transparent';
        
        if (!hasVisibleStroke && !hasVisibleFill) continue;
        
        const opacity = path.getAttribute('opacity');
        if (opacity !== null && parseFloat(opacity) <= 0) continue;
        
        return true;
    }
    return false;
}

function extractThreads(svg) {
    threads = [];
    threadsList.innerHTML = '';
    
    const groups = svg.querySelectorAll('g');
    
    groups.forEach((g, index) => {
        if (g.closest('defs') || g.closest('metadata') || g.closest('title')) return;
        if (!isThreadVisible(g)) return;
        if (!hasVisiblePaths(g)) return;
        
        const childGroups = g.querySelectorAll(':scope > g');
        if (childGroups.length > 0) return;
        
        const paths = g.querySelectorAll('path, line, polyline, polygon, rect, circle, ellipse');
        if (paths.length === 0) return;
        
        let samplePath = null;
        for (const p of paths) {
            const display = p.getAttribute('display');
            const visibility = p.getAttribute('visibility');
            if (display !== 'none' && visibility !== 'hidden') {
                samplePath = p;
                break;
            }
        }
        if (!samplePath) return;
        
        const stroke = samplePath.getAttribute('stroke');
        const fill = samplePath.getAttribute('fill');
        const hasStroke = stroke && stroke !== 'none' && stroke !== 'transparent';
        const hasFill = fill && fill !== 'none' && fill !== 'transparent';
        
        let threadType, threadColor;
        if (hasFill && !hasStroke) {
            threadType = 'fill';
            threadColor = fill;
        } else if (hasStroke) {
            threadType = 'line';
            threadColor = stroke;
        } else {
            threadType = 'line';
            threadColor = stroke || fill || '#000000';
        }
        
        const thread = {
            id: `thread-${index}`,
            element: g,
            paths: Array.from(paths),
            name: `Thread ${threads.length + 1}`,
            type: threadType,
            color: threadColor,
            strokeWidth: parseFloat(samplePath.getAttribute('stroke-width')) || 1,
            opacity: parseFloat(samplePath.getAttribute('opacity')) || 1,
            strokeLinecap: samplePath.getAttribute('stroke-linecap') || 'round',
            blendMode: samplePath.getAttribute('style')?.includes('mix-blend-mode') ? 
                samplePath.style.mixBlendMode : 'normal'
        };
        
        threads.push(thread);
        createThreadControl(thread);
    });
    
    if (threads.length === 0) {
        const allPaths = svg.querySelectorAll('path, line, polyline, polygon, rect, circle, ellipse');
        const visiblePaths = Array.from(allPaths).filter(p => {
            const display = p.getAttribute('display');
            const visibility = p.getAttribute('visibility');
            return display !== 'none' && visibility !== 'hidden';
        });
        
        if (visiblePaths.length > 0) {
            const samplePath = visiblePaths[0];
            const stroke = samplePath.getAttribute('stroke');
            const fill = samplePath.getAttribute('fill');
            const hasFill = fill && fill !== 'none';
            
            const thread = {
                id: 'thread-0',
                element: svg,
                paths: visiblePaths,
                name: 'Main Thread',
                type: hasFill ? 'fill' : 'line',
                color: hasFill ? fill : (stroke || '#000000'),
                strokeWidth: parseFloat(samplePath.getAttribute('stroke-width')) || 1,
                opacity: parseFloat(samplePath.getAttribute('opacity')) || 1,
                strokeLinecap: samplePath.getAttribute('stroke-linecap') || 'round',
                blendMode: 'normal'
            };
            threads.push(thread);
            createThreadControl(thread);
        }
    }
    
    threadCount.textContent = `${threads.length} thread${threads.length !== 1 ? 's' : ''} found`;
}

function createThreadControl(thread) {
    const card = document.createElement('div');
    card.className = 'thread-card';
    
    const isLine = thread.type === 'line';
    const color = thread.color === 'none' ? '#000000' : thread.color;
    
    card.innerHTML = `
        <div class="thread-header">
            <div class="thread-color-preview" style="background: ${color}" id="preview-${thread.id}"></div>
            <div class="thread-name">${thread.name}</div>
        </div>
        
        <div class="control-group">
            <label class="control-label">Brush Type</label>
            <select onchange="updateThread('${thread.id}', 'type', this.value)">
                <option value="line" ${isLine ? 'selected' : ''}>✏️ Line Brush</option>
                <option value="fill" ${!isLine ? 'selected' : ''}>🎨 Fill Brush</option>
            </select>
        </div>
        
        <div class="control-group">
            <label class="control-label">
                Color
                <span class="value-display" id="color-val-${thread.id}">${color}</span>
            </label>
            <input type="color" value="${rgbToHex(color)}" 
                   oninput="updateThread('${thread.id}', 'color', this.value)">
        </div>
        
        <div class="control-group" id="width-control-${thread.id}" style="${!isLine ? 'display:none' : ''}">
            <label class="control-label">
                Stroke Width
                <span class="value-display" id="width-val-${thread.id}">${thread.strokeWidth}px</span>
            </label>
            <input type="range" min="0.5" max="50" step="0.5" value="${thread.strokeWidth}"
                   oninput="updateThread('${thread.id}', 'strokeWidth', this.value)">
        </div>
        
        <div class="control-group" id="cap-control-${thread.id}" style="${!isLine ? 'display:none' : ''}">
            <label class="control-label">Line Cap</label>
            <select onchange="updateThread('${thread.id}', 'strokeLinecap', this.value)">
                <option value="round" ${thread.strokeLinecap === 'round' ? 'selected' : ''}>Round</option>
                <option value="butt" ${thread.strokeLinecap === 'butt' ? 'selected' : ''}>Butt</option>
                <option value="square" ${thread.strokeLinecap === 'square' ? 'selected' : ''}>Square</option>
            </select>
        </div>
        
        <div class="control-group">
            <label class="control-label">
                Opacity
                <span class="value-display" id="opacity-val-${thread.id}">${Math.round(thread.opacity * 100)}%</span>
            </label>
            <input type="range" min="0" max="1" step="0.05" value="${thread.opacity}"
                   oninput="updateThread('${thread.id}', 'opacity', this.value)">
        </div>
        
        <div class="control-group">
            <label class="control-label">Blend Mode</label>
            <select onchange="updateThread('${thread.id}', 'blendMode', this.value)">
                <option value="normal" ${thread.blendMode === 'normal' ? 'selected' : ''}>Normal</option>
                <option value="multiply" ${thread.blendMode === 'multiply' ? 'selected' : ''}>Multiply</option>
                <option value="screen" ${thread.blendMode === 'screen' ? 'selected' : ''}>Screen</option>
                <option value="overlay" ${thread.blendMode === 'overlay' ? 'selected' : ''}>Overlay</option>
                <option value="darken" ${thread.blendMode === 'darken' ? 'selected' : ''}>Darken</option>
                <option value="lighten" ${thread.blendMode === 'lighten' ? 'selected' : ''}>Lighten</option>
                <option value="difference" ${thread.blendMode === 'difference' ? 'selected' : ''}>Difference</option>
            </select>
        </div>
    `;
    
    threadsList.appendChild(card);
}

function updateThread(threadId, property, value) {
    const thread = threads.find(t => t.id === threadId);
    if (!thread) return;
    
    thread[property] = value;
    
    if (property === 'strokeWidth') {
        document.getElementById(`width-val-${threadId}`).textContent = value + 'px';
    } else if (property === 'opacity') {
        document.getElementById(`opacity-val-${threadId}`).textContent = Math.round(value * 100) + '%';
    } else if (property === 'color') {
        document.getElementById(`color-val-${threadId}`).textContent = value;
        document.getElementById(`preview-${threadId}`).style.background = value;
    }
    
    if (property === 'type') {
        const widthControl = document.getElementById(`width-control-${threadId}`);
        const capControl = document.getElementById(`cap-control-${threadId}`);
        if (widthControl) widthControl.style.display = value === 'line' ? 'block' : 'none';
        if (capControl) capControl.style.display = value === 'line' ? 'block' : 'none';
    }
    
    applyThreadStyles(thread);
}

function applyThreadStyles(thread) {
    thread.paths.forEach(path => {
        if (thread.type === 'fill') {
            path.setAttribute('fill', thread.color);
            path.setAttribute('stroke', 'none');
            path.removeAttribute('stroke-width');
            path.removeAttribute('stroke-linecap');
        } else {
            path.setAttribute('stroke', thread.color);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke-width', thread.strokeWidth);
            path.setAttribute('stroke-linecap', thread.strokeLinecap);
            path.setAttribute('stroke-linejoin', 'round');
        }
        
        path.setAttribute('opacity', thread.opacity);
        path.style.mixBlendMode = thread.blendMode === 'normal' ? '' : thread.blendMode;
    });
}

// ============================================
// BRUSH PRESET SYSTEM
// ============================================

function toggleBrushMenu() {
    document.getElementById('brushMenu').classList.toggle('show');
    document.getElementById('exportMenu').classList.remove('show');
}

function saveCurrentBrushes() {
    if (threads.length === 0) {
        alert('Open a Looom SVG first!');
        return;
    }
    
    const presetName = prompt('Name your brush preset:', 'My Brush Set');
    if (!presetName) return;
    
    const preset = {
        name: presetName,
        date: new Date().toISOString(),
        brushes: threads.map(t => ({
            name: t.name,
            type: t.type,
            color: t.color,
            strokeWidth: t.strokeWidth,
            opacity: t.opacity,
            strokeLinecap: t.strokeLinecap,
            blendMode: t.blendMode
        }))
    };
    
    savedBrushes.push(preset);
    localStorage.setItem('reeestyle_brushes', JSON.stringify(savedBrushes));
    updateSavedBrushesUI();
    alert(`Saved "${presetName}" with ${preset.brushes.length} threads!`);
}

function loadBrushPreset(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const preset = JSON.parse(e.target.result);
            applyBrushPreset(preset);
        } catch (err) {
            alert('Invalid brush preset file');
        }
    };
    reader.readAsText(file);
}

function applyBrushPreset(preset) {
    if (!preset.brushes || !Array.isArray(preset.brushes)) {
        alert('Invalid preset format');
        return;
    }
    
    // Match preset brushes to current threads by index
    preset.brushes.forEach((brush, index) => {
        if (index >= threads.length) return;
        const thread = threads[index];
        
        // Apply each property
        if (brush.type) updateThread(thread.id, 'type', brush.type);
        if (brush.color) updateThread(thread.id, 'color', brush.color);
        if (brush.strokeWidth) updateThread(thread.id, 'strokeWidth', brush.strokeWidth);
        if (brush.opacity !== undefined) updateThread(thread.id, 'opacity', brush.opacity);
        if (brush.strokeLinecap) updateThread(thread.id, 'strokeLinecap', brush.strokeLinecap);
        if (brush.blendMode) updateThread(thread.id, 'blendMode', brush.blendMode);
    });
    
    alert(`Applied "${preset.name}"!`);
}

function resetToDefault() {
    if (originalThreadStyles.length === 0) {
        alert('No original styles stored. Re-open the SVG to reset.');
        return;
    }
    
    originalThreadStyles.forEach(style => {
        const thread = threads.find(t => t.id === style.id);
        if (!thread) return;
        
        updateThread(thread.id, 'type', style.type);
        updateThread(thread.id, 'color', style.color);
        updateThread(thread.id, 'strokeWidth', style.strokeWidth);
        updateThread(thread.id, 'opacity', style.opacity);
        updateThread(thread.id, 'strokeLinecap', style.strokeLinecap);
        updateThread(thread.id, 'blendMode', style.blendMode);
    });
    
    alert('Reset to original styles!');
}

function updateSavedBrushesUI() {
    const container = document.getElementById('savedBrushesContainer');
    const list = document.getElementById('savedBrushesList');
    
    if (savedBrushes.length === 0) {
        container.style.display = 'none';
        return;
    }
    
    container.style.display = 'block';
    list.innerHTML = '';
    
    savedBrushes.forEach((preset, index) => {
        const item = document.createElement('div');
        item.className = 'saved-brush-item';
        item.innerHTML = `
            <span>${preset.name} (${preset.brushes.length} threads)</span>
            <div>
                <button onclick="downloadPreset(${index})">💾</button>
                <button onclick="applySavedPreset(${index})">Apply</button>
                <button onclick="deletePreset(${index})">🗑</button>
            </div>
        `;
        list.appendChild(item);
    });
}

function downloadPreset(index) {
    const preset = savedBrushes[index];
    const blob = new Blob([JSON.stringify(preset, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `reeestyle-${preset.name.replace(/\s+/g, '-').toLowerCase()}.json`;
    link.click();
    URL.revokeObjectURL(url);
}

function applySavedPreset(index) {
    applyBrushPreset(savedBrushes[index]);
}

function deletePreset(index) {
    if (!confirm('Delete this preset?')) return;
    savedBrushes.splice(index, 1);
    localStorage.setItem('reeestyle_brushes', JSON.stringify(savedBrushes));
    updateSavedBrushesUI();
}

// ============================================
// ANIMATION & EXPORT
// ============================================

function animateSVG() {
    animationIntervals.forEach(clearInterval);
    animationIntervals = [];
    
    const animatedElements = currentSVG.querySelectorAll('animate, animateTransform, animateMotion');
    
    if (animatedElements.length > 0) {
        currentSVG.pauseAnimations();
        if (isPlaying) currentSVG.unpauseAnimations();
    }
    
    currentSVG.style.display = 'none';
    currentSVG.offsetHeight;
    currentSVG.style.display = '';
}

function togglePlay() {
    isPlaying = !isPlaying;
    document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
    
    if (currentSVG) {
        if (isPlaying) {
            currentSVG.unpauseAnimations?.();
        } else {
            currentSVG.pauseAnimations?.();
        }
    }
}

function zoom(delta) {
    zoomLevel = Math.max(0.1, Math.min(3, zoomLevel + delta));
    svgContainer.style.transform = `scale(${zoomLevel})`;
}

function resetView() {
    zoomLevel = 1;
    svgContainer.style.transform = 'scale(1)';
}

function toggleExport() {
    document.getElementById('exportMenu').classList.toggle('show');
    document.getElementById('brushMenu').classList.remove('show');
}

function exportSVG() {
    if (!currentSVG) return;
    
    const serializer = new XMLSerializer();
    const source = serializer.serializeToString(currentSVG);
    const blob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    
    const link = document.createElement('a');
    link.href = url;
    link.download = 'reeestyle-export.svg';
    link.click();
    
    URL.revokeObjectURL(url);
    toggleExport();
}

function exportPNG() {
    if (!currentSVG) return;
    
    const svgData = new XMLSerializer().serializeToString(currentSVG);
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    const rect = currentSVG.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    
    img.onload = () => {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const link = document.createElement('a');
        link.download = 'reeestyle-export.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
    
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    toggleExport();
}

// Utility
function rgbToHex(color) {
    if (!color || color === 'none') return '#000000';
    if (color.startsWith('#')) return color;
    
    const rgb = color.match(/\d+/g);
    if (rgb) {
        return '#' + rgb.map(x => {
            const hex = parseInt(x).toString(16);
            return hex.length === 1 ? '0' + hex : hex;
        }).join('');
    }
    return '#000000';
}

// Close menus when clicking outside
document.addEventListener('click', (e) => {
    if (!e.target.closest('.export-menu')) {
        document.getElementById('exportMenu').classList.remove('show');
    }
    if (!e.target.closest('.brush-menu')) {
        document.getElementById('brushMenu').classList.remove('show');
    }
});
